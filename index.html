<!DOCTYPE html>
<html>
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2 id="msg">正在初始化身份绑定...</h2>
    <script>
        async function run() {
            try {
                await liff.init({ liffId: "2010389780-7EqdOiVo" });
                const profile = await liff.getProfile();
                
                // 将下面这一行替换为你刚刚复制的真实地址
                const url = "https://hook.us2.make.com/dh6pqhsn4irpp8zj2ddybvsgbkarsljs";
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        line_id: profile.userId,
                        line_name: profile.displayName
                    })
                });
                
                if (response.ok) {
                    document.getElementById("msg").innerText = "绑定成功！";
                } else {
                    document.getElementById("msg").innerText = "传输失败: " + response.status;
                }
            } catch (err) {
                document.getElementById("msg").innerText = "错误: " + err.message;
            }
        }
        run();
    </script>
</body>
</html>

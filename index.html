<!DOCTYPE html>
<html>
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2 id="status">正在初始化...</h2>
    <button id="btnBind" style="display:none; padding:15px; font-size:18px;">点击确认绑定身份</button>

    <script>
        async function run() {
            await liff.init({ liffId: "2010389780-7EqdOivo" });
            
            // 如果用户没登录，强制引导登录
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            document.getElementById('status').innerText = "欢迎 " + profile.displayName + "，请确认绑定";
            document.getElementById('btnBind').style.display = "block";

            // 绑定点击事件
            document.getElementById('btnBind').onclick = async () => {
                const urlParams = new URLSearchParams(window.location.search);
                const email = urlParams.get('email');
                const url = "https://hook.us2.make.com/dh6pqhsn4irpp8zj2ddybvsgbkarsljs";
                
                await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ line_id: profile.userId, user_email: email })
                });
                document.body.innerHTML = "<h2>绑定成功！您可以关闭此页面了</h2>";
            };
        }
        run();
    </script>
</body>
</html>

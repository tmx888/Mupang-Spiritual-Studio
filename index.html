<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份绑定</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2 id="status">正在同步身份，请勿关闭页面...</h2>

    <script>
        // 你的 Make Webhook 地址
        const MAKE_WEBHOOK_URL = "https://hook.us2.make.com/dh6pqhsn4irpp8zj2ddybvsgbkarsljs"; 
        // 你提供的 LIFF ID
        const LIFF_ID = "2010389780-7EqdOiVo"; 

        async function initializeApp() {
            try {
                // 初始化 LIFF
                await liff.init({ liffId: LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                
                // 获取用户信息
                const profile = await liff.getProfile();
                const idToken = liff.getDecodedIDToken();
                const userEmail = idToken ? idToken.email : "无邮箱";

                // 发送数据到 Make
                const response = await fetch(MAKE_WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: userEmail,
                        line_id: profile.userId,
                        line_name: profile.displayName,
                        timestamp: new Date().toISOString()
                    })
                });

                if (response.ok) {
                    document.getElementById("status").innerText = "绑定成功！正在关闭...";
                    setTimeout(() => {
                        liff.closeWindow();
                    }, 1000); 
                } else {
                    document.getElementById("status").innerText = "服务器返回错误，请联系管理员。";
                }
            } catch (err) {
                console.error(err);
                document.getElementById("status").innerText = "错误：" + err.message;
            }
        }

        initializeApp();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2 id="msg">正在同步数据，请稍候...</h2>
    <script>
        async function run() {
            try {
                // 1. 初始化
                await liff.init({ liffId: "2010389780-7EqdOiVo" });
                
                // 2. 获取资料和邮箱
                const profile = await liff.getProfile();
                const idToken = liff.getDecodedIDToken(); 
                const userEmail = idToken ? idToken.email : "未获取到邮箱";
                
                // 3. 发送给 Make
                const url = "https://hook.us2.make.com/dh6pqhsn4irpp8zj2ddybvsgbkarsljs";
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        line_id: profile.userId,
                        line_name: profile.displayName,
                        user_email: userEmail  // 这一行是关键补丁
                    })
                });
                
                if (response.ok) {
                    document.getElementById("msg").innerText = "绑定成功！(Email: " + userEmail + ")";
                } else {
                    document.getElementById("msg").innerText = "传输失败: " + response.status;
                }
            } catch (err) {
                document.getElementById("msg").innerText = "错误: " + err.message;
            }
        }
        run();
    </script>
</body>
</html>

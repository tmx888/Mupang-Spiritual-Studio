<!DOCTYPE html>
<html>
<head>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <h2>正在绑定身份...</h2>
    <script>
        async function run() {
            // 1. 初始化 LIFF，使用新的 ID: 2010389780-WljvFcCk
            await liff.init({ liffId: "2010389780-WljvFcCk" });
            
            // 如果用户未登录，先跳转登录
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }
            
            // 获取用户 profile
            const profile = await liff.getProfile();

            // 2. 从网址获取 email (例如: .../?email=abc@test.com)
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');

            // 3. 发送给 Make Scenario C 的 Webhook
            const url = "https://hook.us2.make.com/dh6pqhsn4irpp8zj2ddybvsgbkarsljs";
            await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    line_id: profile.userId,
                    user_email: email // 这里就是那个从表单传来的邮箱!
                })
            });
            
            document.body.innerHTML = "<h2>绑定成功！</h2>";
        }
        run();
    </script>
</body>
</html>
